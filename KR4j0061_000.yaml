body:
  text: 珂雪詞詞曲類一詞集之屬提要臣等謹案珂雪詞二卷國朝曹貞吉撰貞吉有珂雪詩已著録是編則其詩餘也上卷凡一百三十四首下卷凡一百五首其總目所載補遺尚有卜算子浪淘沙木蘭花春草碧滿江紅百字令木蘭花慢臺城路等八調而皆有録無書殆以附在卷末裝緝者偶佚之歟其詞大抵芊綿清麗寄託遙深古調之中緯以新意不必模周範柳學步邯鄲而自不失為雅製蓋其天分於是事獨近也陳維嵩集有貞吉咏物詞序云吟成十首事足千秋趙明誠金石之録遜此華文郭宏農山海之篇慚斯雅製雖友朋推挹之詞不無溢量要在近代詞家亦卓然一作手矣舊本每調之末必列王士禎彭孫遹張潮李良年曹勳陳維嵩等評語實沿明季文社陋習最可厭憎今悉刪除以清耳目且以見文之工與不工原所共見傳與不傳在所自為名流之序跋批㸃不過木蘭之櫝日久論定其妍醜不由於此庶假借聲譽者曉然知標榜之無庸焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4a287ed4b0932e1f032a07de0530e5f78dd08a51ca35d0e18590a569207d2d24
