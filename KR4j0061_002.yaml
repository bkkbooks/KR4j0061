body:
  text: 珂雪詞巻下禮部貟外郎曹貞吉撰解語花咏水仙同家弟作鏤氷作面剪雪為衣溪畔盈盈女幽懐誰許相逢處翠袖低垂不語淡黃睂嫵聽子夜歌殘白紵更難兼並蒂連枝姊妹還同侣因念雲迷洛浦自陳王去後離别酸楚明珠翠羽相遲誤脈脈此情塵土花魂無主抵多少小牕㣲雨願年年月白風清仗東君留取又和人咏驪山温泉蜃蒸作霧地湧成珠一水溶溶貯炎涼誰主大千界只有清流可語乾坤奥府是天地恩波凝注閲從來蕭索繁華多少傷心處記否長生雨露乘春風靈液蕩潏容與霓裳妙舞驚魂散鐵騎漁陽鼙鼓石蓮如許想舊日魚龍無數悵華清一帶蘼蕪任撫今弔古又詠美人花間影和鳳于伯勞偷喚纔理晨粧小立東風徑緑隂深靚苔痕溼羅襪一鈎清冷遲迴不定喜蝶粉花光相映生憎他倒暈明霞漏洩驚鴻影百襇繡裙厮稱似天風吹墮露桃仙井冶遊暗省銷凝處怕惹離魂難靜流輝耿耿任撲䔩亂紅飛暝帶滿身香氣歸來向枕邊猶剩渡江雲送蔣京少下第遊楚步其年韻對西風一笑碧雲黃葉怊悵舊霜毫珠投仍按劒悔殺平生未譜鬱輪袍雪花似翼桑乾路寒色刁騷任紛紛黃金白璧意氣属吾曹帆搖女兒浦口新婦磯邊看江天影倒問六朝艨艟鐡鎖盡逐洪濤蘆聲瑟瑟鵾絃急伴漁火酒醒無聊湘岸濶回頭咫尺青霄又欲雪溼雲黏似絮闗山凍合風色偃貂裘玉樓寒起粟知是僊人咫尺駕銀虬黃昏漠漠牕影黑思挂簾鈎誰剪碎明河氷水一夜下皇州還愁孟婆潦倒滕六商量怕梅花孤痩又化作輕煙薄霧繚繞枝頭五更錯認虚生白最分明碧落清幽成獨笑飛瓊畢竟遲留珍珠簾為牧仲題楓香詞烏絲閒寫柔情句吟紅豆才子梁園新賦高調和人稀似引商荆楚憶佩雙鞬隨豹尾諳出塞凄風冷雨辛苦早中年易感鬢絲添素又向粉署為郎聽薫香侍史鵞笙曲度動魄復驚心耿一天星露江上青楓聞鐡撥抵多少海飛山怒休訴倩岑牟狂客撾殘羯鼔又賦得水晶簾下㸔梳頭雕房幾曲桐隂裏金塘側第一傾城姝麗䰀鬌照人明學逺山螺髻蟬影花光相撩亂襯一片芭蕉濃翠清綺更珊鈎犀押冷波橫地疑是月底初逢被氷輪掩映織綃情思宛轉翫瓊顔倩曉風吹起人在銀河清淺處倚白玉欄杆如水心醉想道書慵把幽懐旖旎木蘭花慢送孫開盛假歸用稼軒韻桑乾河畔路沙似雪是還非想杖䇿從軍頻年轉戰今始成歸金􅀈山南射虎更淋漓醉墨染弓衣白馬青絲未了霜鱸紫蟹空肥擁麾清渭駐全師落日二陵西早一騎黃塵數聲清角東下旌旗依稀四明狂客㸔江湖滿地鷓鴣飛無那孫郎病骨不勝玉繞金圍又寄武曽故人知我在枉尺素自菰蘆想秋錦堂中蕭然四壁鶴徑親鋤蘧廬不堪回首望青山一髮淚痕枯九日龍番葉落三秋葛鏡霜鋪歸歟迢逓歲華徂眇眇正愁予想夢覺沉唫鳥名脫佛魚喚娵隅南湖先生健否正長安氷雪上鬑鬚辛苦馮唐老矣煙波垂釣何如又送徐方虎假歸官河懸夕照帆十丈影垂垂正白露橫空寒螿聲急蘆葉爭飛追隨東門千騎羨相如擁傳有光輝驛路水明沙碧江鄉蟹美鱸肥東籬無恙柘桑圍罨畫越來溪早魚鳥闗心煙霞寄傲才子初歸燃藜龍門太史擬江山賀監是耶非莫戀紫蓴紅蓼來司玉册金泥桂枝香蟹風清露細早稻熟江鄉嫩涼無比八跪雙螯郭索迷離煙水斷蘆折葦洲邊憩羨輪囷行沙如駛寒潮來去孤舟没滅漁燈初起正好是荒村雨霽問何人笭箵蕭然汀嘴小市平橋過處霜天凝紫橙黃橘緑登高㑹醉東籬酒人風致依稀記得魚莊設籪夜分無寐齊天樂蟬前身疑是空山侣遺蛻杳然仙去露給資糧形藏宻葉有得孤高如許緑隂亭午引天籟笙簧移宫換羽雨後㣲涼餘音搖曳過庭樹依稀銀鴈柱𦂳被晚風吹斷曼聲凄楚八尺琉璃半簾蒼翠睡起了無情緒秋來更苦咽四壁寒蟲無聊和汝且莫哀吟覓疎林宿處又春晚同諸子遊祖園城南韋曲東風路長蕪緑暗如許㡌影參差衣香掩冉漸入水雲多處閒亭列俎似鮭菜江鄉茶煙顧渚浣盡京塵一雙布穀樹隂語深巵且共斟酌怕穿林風雨亂紅無數節過浮觴人同荷鍤作達全忘羇旅遊絲飛絮倩燕嘴蜂鬚將春繫住芍藥開時又攜尊㸔去水龍吟咏栁絮用坡公楊花韻千紅萬紫誰留頻驚暗裏韶光墜飛來何處漫天香雪撩人情思纔過平橋又穿小徑柴門深閉任蜂鬚燕嘴交銜不定三眠了還三起記得鵞黃初撋等閒間又成虚綴曉風乍引離魂難定杜鵑聲碎飄泊無心輕狂有態恨抛流水願年年常傍永豐坊側㸔伊清淚又白蓮平湖煙水㣲茫箇人彷彿橫塘住碧雲乍起羽衣初試靚粧楚楚露下三更月明千里悄無㝷處想蘆花蘋葉㝠濛一色迷玉井峰頭路莫是苧蘿未嫁曳明璫若耶歸去遊仙夢杳瑤天笙鶴凌波㣲步宿鷺飛來依稀難認風吹一縷泛木蘭舟小輕綃掩映問誰家女又春日送客過慈仁寺感舊尋常彈指聲中優曇偶現空王地海棠着錦丁香衣紫霞烘煙細急管哀絲青衫白袷嬉春情味嘆穠華電擲風流雲散容易下中年淚身是金閨倦客賦渭城重過蕭寺倡條冶葉笑人岑寂樹猶如此只有孤松似曽扶我當時沉醉倩禪燈老衲往來指㸃說花榮瘁又咏蠟梅嶺頭異種誰留檀心初暈猶含凍輕黃試着歌翻金縷曉風吹送剪蠟王郎等閒粧㸃珠珠成鳳想壽陽閣下飛來一片逺山際蜂黃擁記否師雄曽夢月朦朧拂衣寒重颯然驚覺天空雲淨翠禽㣲哢乳色侵鵞流光照夜暗香浮動願明年更綴如來金粟淡煙低攏憶舊遊題郭熙秋江行旅圖㸔迷離一片淼淼洪波漠漠平沙烏柏丹楓岸問何人驢背悵望天涯驚風亂葉飛墜㡌影任欹斜况幾縷殘雲千尋疉嶂滿目蒹葭荒寒入真境是舊日河陽貌寫煙霞曽記遊呉楚泛扁舟東下指㸃神鴉少年回首一夢江上聽悲笳更對此何堪京塵如霧棟開花瑞鶴仙咏灌嬰廟瓦硯照夢牕詞填嶙峋黃玉璞化陶泓光怪藝林棲託梅花費雕琢問何時出土琉璃如削漢家封爵是潁隂諸侯刻桷嘆灌池遺廟荒涼怊悵風雲刀槊猶昨滎陽屯後白馬盟書丹青酬酢幾年寂寞人礪劒牛磨角論功高值得詞華消受十二龍賓盤礴試代他盾鼻磨來筆花亂落宴清都詠宋人大食甆茶杯猶帶鯨波冷遙天色斷雲㣲露清影玻璃質脆盈盈不類汝哥官定曽隨月葉金書煩赤罽拳鬚管領而今作承露銅盤僊人淚滴猶剰思量紫袖昭容白頭阿監深夜調茗松濤罷響流泉淡注碧梧銀井那堪回首天上空暗憶龍團鳳餅伴高齋瀟灑琴罇小牕日永花犯詠花鴨傍雕欄啄花唼葉呼名任遊戲依稀蘆岸蘸拍拍煙波成隊飛起紅裙偷裹採蓮女船頭競弄水好趂取碧天雲淡桄榔斑暗記何人竹弓莫輕彈鴛鴦交頸處驚他濃睡爭撲鹿澄潭下嫩黃難比渾迷却斷霞一㸃㸔隻影橫斜穿暮紫倩去伴甲煎銀葉蹣跚香霧裏臺城路詠隗囂宫甆盃丸泥不閉函闗路神功煅來杯斚色映琉璃聲隨哀玉淺碧嫩黃交射流霞欲化想西伯雍容葡萄傾瀉紫殿基平何人收拾夜泉下千年又成廢寺早霜鐘粥鼓相伴清暇土嚙花斑魚吹浪白過眼興亡難話誰堪並價有銅雀荒臺尚留殘瓦且盡深巵任更䦨燭灺又遼后洗粧樓東樓春色天邊落來時白蘋風作鳳輦曽留瑤臺乍起粧㸃逺山睂角宫蟬綽約想欲動晨光未垂簾箔炫轉熒煌明星一一帶池閣興亡幾番過眼聽遊人指說斜照城脚窣堵波高雨淋鈴急壞磴莓牆蕭索驚飈振籜是曲裏琵琶白翎哀雀只有長河潺湲聲似昨又送分虎歸長水秋隂慘淡天如墨城頭角聲初起野水長橋炊煙小市魚尾斷霞成綺羇愁未巳怕土銼荒涼夜長難睡人影幢幢一行清露曉風裏分湖紫蠏正美桃鄉新稻熟流匙香細白鴈縱橫黄花爛漫還憶離亭曲子行縢漫試便脚底匡廬不如歸計霜冷呉楓扁舟棲暗葦栁色黃對雨和竹垞栁絮為萍梅子漸黃天氣如許溪雲乍起遮山釀做幾絲㣲雨東西不定搖曳淡霧輕煙荷錢一一跳珠露庭樹碧參差䕃青苔無數平楚斷塘遙指如髮秧針緑迷南浦暗想空江軋軋惟聞柔櫓亂紅無影寂寞靜掩疎籬銅街濕糝香塵路倩斗帳高眠小牕邊聽去拜星月慢秋日雨後飲宋子昭新泉亭座上聞歌撩亂苔錢差池菱葉白板橋邊秋水㸃㸃浮漚溜銀塘珠碎斷雲溼拖逗餘霞明滅暈作逺山螺髻薄暮罇開正玉簫聲起顫氷絃百囀春鶯脆西風冷月落朱門閉一朶兩朶幽蘭共荷香迢逓汲新泉乍試龍團味紅燈小不照愁人醉待歸時露滿閒堦有唫蟲伴睡霓裳中序第一詠龍鬚為渭清賦崢泓勢猶怒誰向層波剪氷箸憶當日青天乍擘伴火鬛朱鱗度雲穿霧清秋島嶼抱驪珠濃睡腥雨莫也是洧淵戰罷飄落翠蓬路羈旅生涯如許還藏得鮫宫幾縷輕綃鈿合潛貯怕一夜驚雷破壁飛舞何人拾鳳羽便鬬草休教換去他年事天風鶴背拔下又重數又爲杞園題浮家圖煙波寛幾許抖擻青蓑垂釣去恰流水桃花時節對西塞山前一雙飛鷺高風可遡倩生綃三尺留取㸔歴歴筆牀茶竈泛宅畫中住今古逃名漁父怕東華軟紅如霧江湖自結鷗侣正栁下移船菰邊分路美人共蘭渚又何必天家賜與仙槎上此生有分鼓枻帶笭否綺羅香宋牧仲座上聞歌抹麗凝香池塘過雨屈注明河天際雪酒銀桃六月燕山風味倩數聲玉笛吹來似一串驪珠擲碎看盈盈初日芙蕖雙瞳剪水兩眉翠青衫留落舊客遮莫嬌絲脆管難令沉醉幾㸃螢光猶照蒼苔無寐好宫調賀老教成倦心情屏風立地漫流連入破伊州記楓香曲子又沈融谷新娶夫人善琹書同人共賦栁宻藏鴉堂空語燕大好夭桃天氣蝶粉初消二月東風破睡鏡奩映筆格珊瑚硯匣伴眉粧翡翠最憐他腕底橫斜烏絲閒寫麗情字珍珠指下亂撒彈入明光一曲聲隨流水兒女喁喁㸃綴小牕幽致妒兩行銀鴈輕飛墮萬里玉闗清淚記夜深金鴨燒殘迷離香霧裏瀟湘逢故人慢張晴峰脩雷琴成有贈千年神物是天寶元音宣和遺譜零亂金徽苦想閱遍繁華蘧然今古流水高山彈不盡喁喁兒女當此際燕市重遊白髮郎官知汝續鸞膠調鳳咮早韻磬琤琮響泉凄楚百衲還堪鼓似海岸窈㝠成連徑去危柱哀絃抵多少驚沙飛雨再等到蛇蚹紋成又是幾番旦暮永遇樂送孫屺瞻學士歸省十丈蒲帆一篙秋水仙舟天際繡虎才人珥貂貴客歸作承歡計當年射䇿五雲日下臚唱魏公第二羨璧人天街衣馬夾道爭㸔如蟻紫宸朝罷講筵初御金椀天漿親賜東觀深嚴北門清切待署黃麻紙君恩暫許湖山佳處添箇宫袍萊子須珍重黑頭卿相碧紗名氏又和人望崋山誰鑿鴻濛最驚人處芙蓉千丈激蕩疑潮崩騰似馬羅列兒孫狀八荒雷雨一天蒼翠縹緲靈旗想像待清秋憑陵絶頂畫裏秦川如掌潼闗孤聳黃河東注俯覽翻増惆悵颯颯天風冷泠環珮九節仙人杖咄哉韓子蒼龍迴馭那得褰衣長徃耐可拉青蓮居士三峰高唱消息和錫鬯度鴈門闗蕭瑟闗門西風吹雪貂裘都偃蟻垤行人羊膓驛路哀角邊聲怨魚海氷寒龍沙戍斷歴亂蓬根飛捲悵青衫暮雲驅馬望盡蒼蒼脩坂絶壁祠堂趙家良將入夜靈旗如電折㦸沉沙老兵拾得磨洗前朝辨塞鴈南飛滹沱東注可惜英雄人逺問誰是封侯校尉虎頭仍賤秋霽本意過雨長天早露重閒階新月如沐射角明河垂簷珠斗苔影上人眉緑流螢誰撲霜紈小扇銀塘曲渾無寐風度藥欄戛戛響脩竹漏殘酒醒篆冷煙銷隱壁秋蟲似伴幽獨拂莓牆花香作陣秋蘭綽約疑空谷故國難窮千里目悠然歸興只在黃葉村中白蘋鄉裏數間茅屋南浦春水用玉田詞韻新漲碧于天近清明做弄橫塘晴曉輕燕掠波圓靴文細一片麯塵誰掃魚梭織影跳珠只似荷錢小催雨東風寒又暖緑遍長堤芳草漫漫别浦瀠洄驚畫船簫鼓鷗眠未了鴈齒接紅橋漁莊逺何處鳴榔聲到斷煙渺渺斜川如帶平蕪悄撲面楊花飛作陣添入浮萍多少又秋水再疊前韻片月映寒汀碧澄澄人對江山清曉緑淨繞柴扉晴磯上巳有垂楊先掃蘆花似雪連拳鷺占圓沙小淡抹遙天渾一色夾岸粘雲衰草百川爭赴長河㸔魚牀燈火黃昏近了白露老蒹葭清歌發無數採蓮船到平湖浩渺芙蓉落盡空潭悄又是霜明波冷後此際撈蝦人少花發沁園春詠司馬相如私印倒薤披離朱絲零亂土花苔葉交亞龍文覆斗天色垂隂温潤玉情堪把千秋作者字裏認當年司馬嘆經過華屋山丘閲人良自多也辛苦臨卭書劍倩何人昆刀刻鏤風雅凌雲賦就卓女粧成十様蠻牋親打纎纎欲下早逗漏明紅一罅好留伴硯匣琉璃冷光朝暮相射又賦得流水桃花色萬㸃殘紅五更㣲雨夜來初塟傾國暗落無聲飛流不定染就明霞一色鮫姝淚織似淡抹胭脂還溼最好是啖影游魚儵然身住花宅莫也神仙作劇賺溪邊漁人歸路難識一篙渡濶千尺潭深根葉漫從尋覔珊瑚浪擲任送下東溟無力蕩空濛水氣花光赤城雲起相射尉遲杯詠朱碧山銀槎照蔡松年詞填黃流注送扁舟似葉凌雲渡蟲書猶記當年想見良工心苦何人稱杜舉都不管華堂幾朝暮但茫茫醉了還醒夢裏居然千古因思博望去逺縱苜蓿蔔萄回首非故太乙爐開朱提液冷好泛明河深處問此去盈盈一水曽否有黃姑相逢語慢學他羽化神奇酌盡天漿無數望逺行咏延陵季子劍寒星黯淡青銅色出匣驚飛風雨龍鱗三尺虎氣千年彷彿精靈堪語記得當時曽帶故人荒隴此道于今如土挹神光重見冠裳楚楚賓旅鳴珮中原歴聘只解識寸心相許回首蘇臺魚膓忽起散亂長鈹無數試弔要離墳草鴟夷潮水一様英雄難訴對州來君子恩讐忘否解連環咏蘆花遙和錢舍人驚風凄切滿江干一片凍雲吹折飄萬㸃不辨東西枉賺得行人鬢絲添雪明月光中隱沙岸鴻聲清絶更閒隨釣艇暗入柴門伴人騷屑助他怒潮嗚咽捲興亡舊恨浪花明滅笑垂楊只解飛綿難㸃上征衫迷離成鐡露冷蒹葭還記得緑芽如髮問故家秋娘何在風流總歇一寸金詠長平遺鏃數㸃寒鋩入眼離離土花碧是咸陽王者神兵親鑄沉沙千載耕夫重得黯黮黃金色試磨洗猶堪穿石笑平原計誤馮亭圍合邯鄲幾輕擲暗想當年武安初將疾聲撼趙壁早沙蟲猿鶴一軍都化粘雲衰草戰塲如昔鬼哭西風裏最慘澹天隂月黑乍摩挲線齒銀䦨怕帶青燐跡風流子京口懐古三山圍鐡甕孫郎後今古幾英雄憶北府參軍寄奴王者金戈鐡馬橫據江東凌歊上歌風追漢帝置酒宴羣公一代偉人龍行虎步十年征戰洛下闗中祇今憑弔處佛貍祠下路煙樹㝠濛爲念尋常巷陌社鼓連空算碻磝戰地幾多白骨金焦名勝兩㸃青峰惟見驚濤滿眼東去匆匆又金陵懐古大江流日夜寒潮急寂寞打空城想玉樹曲終梁塵爭落金釵垂後斜月低橫如今但荒臺存瓦礫廢殿走鼯鼪桃葉渡頭半篙春水莫愁湖畔一片秋聲南唐成徃事攝山㸔斷碣夢裏三生千載澄心堂紙撥鐙書名歎衣冠王謝高低禾黍文章庾鮑冷落沙汀依舊龍蟠虎踞渺渺峰青又姑蘇懐古胥門懸落日東風軟人立小斜廊是越女靚粧舞停歌罷捧心無賴展轉迴腸難重問錢江煙水白檇李陣雲黃歌吹海中荒哉旦暮温柔鄉裏老矣君王勾章烽火急見姑蘇臺畔長劍如霜誰念鴟夷相國目斷危檣早輕裝一舸浮家逺去功成身退磊落行藏回首故宫花草難遣茫茫又錢塘懐古英雄開草昧山衣錦萬弩射潮低彼呉越一王高車駟馬威靈五季玉册金泥驚回首西陵煙月淡葛嶺斷霞飛三竺六橋老髯曽醉斜風細雨和靖頻題六飛南巡後西湖比西子緑拆紅欹惟憶金明池水禾黍離離想德壽重華兩宫遊幸綺羅絃管繚繞蘇堤千載江山如故還使人悲又題劉岱儒葭水山房城南泥水路蒹葭滿白露曉蒼蒼想茅屋數間中央宛在青蓑箬笠何處鳴榔漁歌發斜風楊栁岸細雨薜蘿牆鷺立晚汀㸃開波面鴉翻亂葉界破殘陽伊人高卧處有茶鐺丹竈布被繩牀遙指軟紅十丈應笑人忙似煙波釣叟浮家泛宅魚鰕結伴雲水為鄉誰道桃花片片誤却劉郎疎影咏落照遙和錢舎人斜陽欲下學西流弱水如電傾瀉未免多情弄影蒼然迴光更戀亭榭明霞幾縷霜天赤掩映作江山圖畫最撩人烏桕丹楓常是借他聲價依約黃昏近矣齊飛並孤鶩秋色瀟灑莫向樓頭賺得愁人一地迷離生怕平蕪衰草凄涼處有多少暮雲歸馬倩開元小李將軍海岸斷紅描寫又黃梅遥和武曽春前數㸃向水邊林下孤影凌亂圓磬開時一抹檀心明霞暈去還淺分他厓蜜餘甘後怕金粟如來窺見映短籬初月㣲昏迢逓暗香門掩蜂凍寒聲細細偶來覔蕋處飛入難辨莫是僊人淚滴銅盤幻作此花生面誰家少婦年年織織不到乳鶯嬌蒨趂夜燈移近罇前騐取珀光濃淡又詠金絲荷葉絲縈别浦似嫩荷出水青青如許弱蔕牽風乍宻還疎不礙蜻蜓來路何人種向西牕外添幾㸃黃昏㣲雨若遣伴翠葢紅衣玉井更無尋處誰把嘉名錫汝傍葓塘蓼岸歌罷金縷淺碧初勻手弄柔波淡沲難成珠露深秋怕作䦨珊别共三十六陂凄楚且逐他荇葉田田一曲風潭清暑八寶粧咏未央宫銅奩渭上西風漁牀晚照鐡網千絲初舉翡翠迷離光映水一片苔痕凄楚咸陽遺製花天月地樓臺蜂黃蝶粉重重䕶細字蟲魚繡斷依稀金縷未央抛擲何年昆吾村外溼燐入夜偷聚慣㸃綴鮫宫眉嫵問飛燕菱花曽貯思伴侣銅駝陌上黃昏聽盡瀟瀟雨算流落人間玉箱也出茂陵去霜葉飛村居數間茅屋荒原悄紆迴樵徑幽獨半竿斜照亂鴉啼早隴頭歸牧㸃幾樹丹楓似簇空林墮葉聲聲續喜野老忘機共領畧清泉白石閒伴麋鹿入畫范緩倪迂柴門雙掩靜對千尺飛瀑繩牀高卧聽秋風問何榮何辱漫料理牛衣􅀢􅝹凝寒未到深谿谷倩濁醪消長夜醉裏生涯悠然良足蘇武慢元宵雪後作皓魄初圓罡風猶勁剪破彤雲萬里桂影扶疎嫦娥清冷白玉樓頭似水銀花作陣火樹迷空照見離離珠蕋想蜀天積雪峨嵋崖下佛燈如此何須問雙鳳雲間六鰲海上簫鼓聲中燕喜竹葉橫牕松隂滿徑有箇幽人在裏白眼誰同青罇易歇赤脚層氷遊戲應難尋千樹梅花長笛一聲而已惜餘春慢雨雹窈窕紋紗參差曲檻無計消他長夏金鉦匿影石燕穿雲縹緲靈旗來也隱隱輕雷度時不惜真珠抛殘盈把似湘妃游泳玉徽零亂氷絃彈罷又疑是破陣錢塘青天飛去雪霰一時交下介山昨夜風雨黃昏霹靂車憑誰借怊悵方塘碧筒出水初圓怎禁狼藉助新涼午夢繩牀彷彿聲飄鴛瓦沁園春長夏少事撫枕輒睡夢境荒忽不一而足因集古人夢事成篇梧影初回槐角風涼引入華胥見蝴蜨園中翩翩晒粉邯鄲道上袞袞騎驢蕉鹿慵㸔櫻桃空啖擬上蚍蜉王者書南柯郡有同昌嘉禮覔醉何如排空馭氣歸歟更嬝嬝巫雲送我車問風雨連宵西施曽塟鳳凰再降蕭史焉居黍米山川蘧廬將相一瞬悲歡付子虚醒來後對荳棚茗椀半晌躊躇又贈栁敬亭席㡌單衫擊缶嗚嗚豈不快哉况玉樹聲銷低迷禾黍梁園客散清淺蓬萊蕩子辭家羈人逺戍耐可逢塲作戲來掀髯笑謂浮雲富貴麯蘖都埋縱橫四座嘲詼歎歴落嶔崎是辨才想黃鶴樓邊旌旗半捲青油幕下罇俎常陪江水空流師兒安在六代興亡無限哀君休矣且扶同今古共此銜盃又病齒戲作檢㸃形骸牙齒空存凋零可哀似潮嚙危巖谽谺欲墮蟲雕敗葉次第成灰活玉巢邊大郎遊戲狗竇從君出入來昌黎曰倘歲常落一兩紀奚猜只愁三五為儕拚一夜霜風散早梅彼伏生牀上傳經詰曲張君柱下覔乳徘徊語怕成訛食還喜軟遮莫廉頗善飯哉柔能久但吾生舌在暫此銜盃又泛舟明湖訪仲愚留飲即事有李道思劉伯敘繼至所謂伊人一水盈盈欲徃從焉見鴈影蕭條煙波上下漁歌欸乃笭箵便娟雨笠煙蓑癭瓢竹杖衰栁殘荷望渺然櫓聲斷恰門橫短港巷面青山一觴一詠流連殊不似扁舟雪夜還况高議雲生尊同北海勝流狎集客比西園鴻爪遭逢萍蹤聚散絶勝他人交十年拚沉醉問中秋好月可照湖干又題美人畫芙蓉嬝嬝亭亭何處折來芙蓉一枝是青溪女士寫生妙手花光粉膩遊戲為之縱使無情也應有恨月白風輕欲墮時堪憐處傍沙汀蘆岸掩冉丰姿多愁多病蛾眉便畫出傷心寄阿誰憶紅樓倦繡輕拈小筆烏絲罷詠淡抹唇脂更費雌黃枝頭㸃染添箇翩翩蝴蜨兒吹能起笑拂蠅成誤老眼迷離又讀子厚新詞却寄不見澂庵六年於兹思如之何憶大明湖畔論心握手之萊海上痛飲高歌以子襟懐消人鄙吝叔度汪汪千頃波分袂後想生平意氣暗裏蹉跎驚聞二䜿相苛早伏枕山中嵗月多幸清漳第近時過小阮人來不夜問訊無他拚事醫王未驅窮鬼且負青青六尺蓑長安市悵故人疎放老子婆娑憑藉飛鴻貽我一編花間草堂喜風流旖旎小山珠玉驚心動魄西蜀南唐更愛長篇嶔崎歴落辛陸遙遙一瓣香吟哦久妬金荃佳句遂滿奚囊休論小弟行藏歎筆硯年來已盡荒縱勞他精衛難填悶海傾來米汁莫潤愁膓鳥亦傷心花能濺淚獨對東風舞一塲如何是羨扁舟漁父蘆荻蒼蒼讀罷新詞擊碎唾壺悄然以悲任邯鄲枕上重裀列鼎大槐宫裏貂錦蛾眉未了功名難消磊塊不向空門何處歸又底事問安期高誓乞取刀圭茫茫大造誰知况世上原無真是非彼南蕐齊物呼牛呼馬靈均呵壁將信將疑我賦三章為君七發得愈頭風或有之掀髯笑望西山一帶暮雨迷離又送藍公漪還閩閩海畸人凌轢詞壇飛揚若斯况煙雲落紙南宫北苑錕鋙切玉周鼎商彞大翮山頭鴻都門下一藝分來自可師延秋路對西風黃葉欹㡌吟詩滄浪遺派攸歸除高棅林鴻更有誰喜霜濃月白共君一醉短衣孤劍此去安之三尺殘陽兩行枯栁衰草平蕪有所思今行矣想舊廬無恙松菊依稀又日照李伯開作生壙成自題云竹帛誰千古煙霞我一丘余喜其能達生也詞以贈之表聖之徒富貴浮雲能齊死生憶早年任俠千夫辟易中年策杖五岳縱橫紫塞黃榆短衣孤劍鬱鬱胸蟠百萬兵今老矣向荒山寄跡汐社藏形牛眠好卜佳城便撒手懸厓自在行彼麒麐贔屭誰當不朽煙霞没滅我本無營大海潮青嵐峰月白樂此安知後世名君無語持黃金鑿落飲若長鯨又再贈李君聊廣其意日月跳丸虎頭健兒鷄皮老翁笑求仙問藥都無憑據靈椿朝菌一様成空羊角扶搖枋榆棲止總在茫茫噫氣中何處問有南柯太守馬鬛高封達人遊戲神通便塜象祁連蟻垤同甚珠襦玉匣牛羊廢壠金鳬銀鴈禾黍秋風天地蘧廬乾坤窀穸千載王孫道未窮今古恨是白楊衰草掩盡英雄八歸題其年填詞圖散聖安禪烏衣白袷淡宕風流如許酒旗戲鼔人間世博得蕭然驢背鬚眉塵土凌轢詞壇三十載寫六代興亡無數翻墨瀋歴落嶔㟢㸔海奔鯨怒誰拂生綃作照維摩清冷坐對散花天女三叠霓裳一聲河滿曲項琵琶金縷問英雄紅粉可到相逢斷膓處想歌䦨深巵㣲勸銀甲春寒水沉香慢炷賀新涼再贈栁敬亭咄汝青衫叟閲浮生繁華蕭索白衣蒼狗六代風流歸扺掌舌下濤飛山走似易水歌聲聽久試問於今真姓字但回頭笑指蕪城栁休暫住譚天口當年處仲東來後斷江流樓船鐡鎖落星如斗七十九年塵土夢纔向青門沽酒更誰是嘉榮舊友天寶琵琶宫監在訴江潭憔悴人知否今昔恨一搔首又送周雪客南歸雲際孤帆巻送將歸登山臨水離情難遣年少周郎江左去望裏寒林霜泫問底事頻勞雙繭奕葉才名推繡虎共秦淮春水無深淺逸興到剡藤展風流顧曲亭邊顯是何年㸔山讀畫佳名題扁擊筑燕臺文酒伴自愧淮南雞犬驪駒唱寧須求免歸矣青溪三尺棹坐六朝金粉繙前典江似練為君剪敗葉西風捲近河