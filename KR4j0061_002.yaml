東呉未施鹽豉入洛舊時語青門外蘋末涼風㣲度片帆乗興歸去此行但為鱸魚鱠那得闗情如許君莫妬須記取青山紅樹空江渡夢回鳴櫓溯萬頃平波田田荇葉欹枕對煙雨又西直門外作北邙邊高低丘壠縱橫無數羊虎玉魚金椀何時葬又見斷碑如礎魂自語須認取文章功業難憑據白楊老樹戰一片秋聲向人頭上颯颯作涼雨西州路敗笠青衫羈旅緇塵撲面來去黃蘆苦竹千秋恨都付紙錢飛處天已暮想入夜雲旗風馬精靈度荒涼三户共塜上狐狸山中木客同結歲寒侣又答沈融谷坐江樓氷甌滌筆新翻水調南浦瑤華飛落長安市紅豆譜來非誤良夜聚有多少烏衣白帢同罇俎悠然懷古甚蘭畹金荃尊前復雅未抵玉田句深巵勸從事青州太苦匆匆鮭菜無序虎房橋畔霜花冷撲上征衫如霧君且住君不見團圞好月參旗度高齋歸去想鳳咮嶙峋龍賓磊落又寫麗情賦又題錫鬯蕃錦集裊茶煙吟成樂府旗亭畫壁無數龍梭一擲光凌亂碎剪碧霞千縷紅豆譜彷彿似方圭圓璧氷花鑄高岑李杜入主客圖中新聲古調總屬麗情句前身是白石仙人非誤精靈虎僕輸汝長安簫鼓千門熱閉戶著書良苦寒欲去又早是春鐙金薤琳瑯處天衣重補羨妙手針神絲絲無縫莫被夜來妬又寄贈史雲臣繞荆溪數間茅屋竹山舊日曽住吟花課鳥無遺恨領袖詞塲南渡逐電去誰更續哀絲脆管紅牙譜湖山如故又幻出才人鏤氷繪影抒寫斷腸句鵾絃上彈入蝶菴金縷平分髯客旗鼓搓酥滴粉方成調偷換羽聲凄楚推獨步須信道秦黃蘇陸無今古江東日暮想席帽風欹春衫酒溼行過翠藤路又方渭仁葺健松齋幸園松之存也詞以贈之響晴濤綠隂半畝神龍拏攫煙霧闗門一夜喧銅馬波上鯨鯢爭怒鳴戰鼔有多少蘭亭梓澤皆塵土午橋如故縱劫火茫茫斧斤不到交讓大夫樹江東秀王謝衣冠最古五陵佳氣呵䕶霜皮黛色年年在㸃綴菊畦桑苧俱園名誰種汝須記取黃山白嶽移根處婆娑自舞㸔五鬛蒼然向人頭上謖謖滴秋雨又謝念東先生惠藥問先生丹砂幾粒是誰搓得如許金膏九轉匆匆熟吹落半天風雨顔可駐君不見淮王雞犬雲中去且留小住待紺髪徐生虬髯更紫重覔玉京路人間世只有鬚眉良苦地黃蘿菔相誤黑頭自笑渾無用一任秋霜千縷飄弱絮有多少北邙年少無尋處尻輪堪馭縱親到神山便能屈曲俛首㸔人否金明池大熱有懷蓬萊閣大海涵青丹樓聳翠淼淼鴻濛奥府蜃氣蕩雲車鬼馬貝闕擁鮫姝龍女望扶桑幾㸃煙螺便打疊鰲背匆匆歸去更荒島人煙斜陽草樹蟹籪魚罾凄楚安得披襟常卧此對銅井金波氷輪初吐無從覔湘靈鼔瑟但可向安期乞霧醉婆娑晞髮臨流任萬斛天風捲晴吹雨縱爍石流金凭欄一嘯試問暑歸何處笛家九日長安遣興和其年黃菊浮觴紫茰盈把露涼風細匆匆早是秋將暮天街如蟻燕尾鬟鬆卓金車響紛紛兒女剪綵旗旛花糕擔子知送誰家去葉爭飛鴈初𦂳只少滿城風雨情緒不堪搖落龍山戲馬何處追遊破帽單衫一襟塵土試問故國荒涼宅榭草長欲齊堦否深巷人歸華堂客醉作陣鳴腰鼔聊送目夕陽邊惟見碧雲千縷又九日蛟門招集諸子遊黑龍潭野水拖藍遙峯疊翠嫩涼時候閒人那不登高去城隂杜曲幾樹枯楊幾層頽壁當年遊處橘井苔腥曉堂霧溼莫作重陽雨話新寒晚鴉急客子羈愁添否良晤峭帆乍歇玉盤鰕菜斟酌南烹蟻緑鱗紅十觴連舉只少繞砌黃花爛漫空負數聲金縷拂拂鞭絲垂垂帽影行過風潭路月上也恰當頭共聽荒畦人語畫屏秋色送舅氏之唐山廣文任行李蕭條去騁逺目禾黍芃芃驛路督亢陂荒滹沲浪急亂雲天暮韋杜舊家聲早打疊寒氊辛苦聽一片鳴蟬訴况夢繞西州哀湍壞道知在斜陽一帶蒼然平楚無語銷魂羈旅更莫去傷今懷古十年蹤跡一番離别悲歡無據馬首又他鄉烏衣巷口人何處苜蓿䦨干堪煮上日及新秋為語天邊好月分照兩人愁緒蘭陵王送二舅之沅州嶺雲白湖草粘天弄碧湘煙淡沅水分流弱栁絲絲罥行色武陵南下驛漸入桄榔瘴黑鵑聲裏鐡騎連營一髮青山望京國依依感疇昔記巷口烏衣門邊霜㦸電光石火音塵寂愁一肩行李半林斜照空祠榕暗嘯木客衡陽鴈程隔難覔謝公屐問橘井遺蹤郢雪荒宅參軍蠻府工書檄念東第凄冷北堂晨夕寒螿啼徹聽砌語助太息大酺石林席上聞絃索正酒船行人聲寂好月如珪偷照鵾雞初入破響風箏刀尺麻姑手爪銀甲徐調氷絲輕撥啄木丁丁小鳥空山無人處任花開花落洞天深窅忽變作玉闗千羣鐡馬平沙衰草呉儂歌縹緲嘆舊曲誰似臨川好遮莫向岐王筵上崔九堂前琵琶彈出傷心調未抵繁絃巧引蝶翅蜂鬚相惱但羈客青衫老奈何頻喚頓減中年懷抱鬢邊明日白了玉女搖仙珮與米紫來論詞即書其集後才人剰技削玉團香有得離奇如此繡嶺宫前苧蘿溪上一一傾城姝麗更把繁絃倚似飛仙劍客乘風遊戲怨離别青衫紅袖消向琵琶羯鼔聲裏沙石砉然驚苦竹黃蘆暗啼山鬼省識紅鹽妙理換羽移宫墮盡闗河人淚細數名家晚唐南宋漫說蘇豪栁膩海岳當年裔平分取書畫船中風味又證入金荃蘭畹小山白石天花亂撒珊瑚碎酒邊珍重烏絲字又詠魚苔牋剡溪玉葉渲染神工却倩銀塘丹鯽波面揚鬚鏡中吹雨飄入碎萍無力一抹空明碧問何人拾取水天顔色欲偷寄飛瓊片紙怕似方諸滴淚難識驚萬縷千絲莫是珠宫鮫姝輕織不辨河山一氣潮落潮平納納乾坤生白杳靄嵐光迷離樹影總帶蠻雲腥澁造物莽闕索有多少寒火温泉寄跡渾未抵浮漚隱現緑闕苔痕掩映荆闗筆憑誰為訊騫霄國多麗送葉慕廬南歸恰新秋一夜涼飈聲急指湘皋晚煙淡處章華臺下荒宅挂蒲帆白蘋鄉裏鱠鱸魚破玉盈尺赤壁江聲烏林戰地楚南形勝依稀記得擊銅斗歌成慷慨棹碎空明碧東籬畔黃花滿徑應待歸客憶燕市匆匆文酒西山亂入遊屐動公卿五雲詞賦才子人稱掞天筆姑射仙姿苧蘿姝麗如君流落也堪惜悲團扇班姬未老永巷青苔隔桑乾路驢背書囊席帽欹側小諾臯輓尤展成夫人德耀眉齊少君車輓十載牛衣人淚憶當年白帢翩翩比肩蘭蕙夫子龍城綰綬紫塞風沙難避賦歸來還共東籬憔悴咏絮庭閒篝燈門閉慰白頭佳兒佳婦百歲相㸔何巳蝶夢醒偏無幾日下蒲輪江邊桂楫驚起山中濃睡全不管西風病骨懨懨情思環珮珊然去矣垂老寧堪傷逝轉眼便泡影空花相似綺户絲縈鏡奩塵細怕黃昏㣲雨疎簾滴到愁人兩耳更莫聽蛩吟碎哨遍題萬栁堂何處嬉春踏青挑菜鄠杜城南地過危橋夕照恰當門亂擁入羣峰螺髻鬱坡陀緑遍粘天芳草粼粼十畝風潭水㸔萬縷千絲交柯接葉掩映長空無際問當年誰折永豐枝巳彷彿靈和殿裏時欲起還眠帶雨拖煙昵人情思是相國滄洲逸興萬象含生氣忘機魚鳥穿林啖影任遊戲更石笋排雲花香作霧東風一剪蘼蕪翠梁苑詩篇西園賓從㸃綴平泉佳麗羨新荷驟雨遺蹤如此似歐冶池邊溯漣洏恨只少篔簹谷意喜得賜沐餘閒小駐東華騎河上清明洛濱祓禊油壁鈿車來矣年年渲染費春工且自與人同樂耳鶯啼序送牧仲𣙜稅贛闗憶隨羽林十二作英雄指顧正補袞黃閣初開城南尺五韋杜屬車下參差豹尾新豐樹杪旌旗度佩雙鞬馳電長河馬嘶氷路獵騎纔回小篆乍裊誦琳瑯好句讌梁苑賓客鄒枚勝流齊奉樽俎泛扁舟重尋赤壁是玉局舊曽遊處嘆臨臯一段風流杳然千古京塵再染屬國旂常九賓㸔拜舞又移入白雲司裏雞舌香賜綽約雙鬟旗亭歌賭衍波紙寫驚心動魄廣平氷鐡梅花賦問枝頭紅杏今能否銅龍命下持衡賧布賨錢片帆欲飛南浦清江似鏡章貢分流是天開大府最好向鬱孤臺上極目夕陽幾道蠻煙亂垂平楚乗槎漢使登樓清嘯驚濤拍拍千尋下聽榕隂木客吟詩苦載將亷石歸來滿酌蒲桃歌翻舊譜珂雪詞巻下
